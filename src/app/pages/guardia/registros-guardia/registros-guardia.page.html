<ion-content fullscreen class="dashboard-content">
  <!-- OVERLAY MOBILE -->
  <div
    class="mobile-overlay"
    *ngIf="sidebarOpen"
    (click)="sidebarOpen = false"
  ></div>

  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" [class.open]="sidebarOpen">
      <!-- BODY -->
      <div class="sidebar-body">
        <!-- HEADER -->
        <div class="sidebar-header">
          <img src="assets/img/logo1.png" />
        </div>

        <!-- MENU -->
        <div class="sidebar-menu">

          <!-- VISITAS -->
          <div class="menu-group">
            <button
              class="menu-button"
              (click)="toggleMenu('registrarVisitas')"
            >
              <span>📋 Gestión Visitas</span>

              <ion-icon
                name="chevron-down-outline"
                [class.rotate]="openMenu === 'registrarVisitas'"
              >
              </ion-icon>
            </button>

            <div
              class="submenu"
              *ngIf="openMenu === 'registrarVisitas'"
            >
              <button
                (click)="mostrarSeccion('registrarVisitas'); sidebarOpen=false"
              >
                Registrar visita
              </button>

              <button
                (click)="mostrarSeccion('listarVisitas'); sidebarOpen=false"
              >
                Lista visitas
              </button>
            </div>
          </div>

          <!-- TURNOS -->
          <div class="menu-group">
            <button
              class="menu-button"
              (click)="toggleMenu('registrarTurnos')"
            >
              <span>🕒 Gestión Turnos</span>

              <ion-icon
                name="chevron-down-outline"
                [class.rotate]="openMenu === 'registrarTurnos'"
              >
              </ion-icon>
            </button>

            <div
              class="submenu"
              *ngIf="openMenu === 'registrarTurnos'"
            >
              <button
                (click)="mostrarSeccion('registrarTurnos'); sidebarOpen=false"
              >
                Registrar turno
              </button>

              <button
                (click)="mostrarSeccion('listarTurnos'); sidebarOpen=false"
              >
                Lista turnos
              </button>
            </div>
          </div>

          <!-- RONDAS -->
          <div class="menu-group">
            <button
              class="menu-button"
              (click)="toggleMenu('registrarRondas')"
            >
              <span>🔍 Gestión Rondas</span>

              <ion-icon
                name="chevron-down-outline"
                [class.rotate]="openMenu === 'registrarRondas'"
              >
              </ion-icon>
            </button>

            <div
              class="submenu"
              *ngIf="openMenu === 'registrarRondas'"
            >
              <button
                (click)="mostrarSeccion('registrarRondas'); sidebarOpen=false"
              >
                Registrar ronda
              </button>

              <button
                (click)="mostrarSeccion('listarRondas'); sidebarOpen=false"
              >
                Lista rondas
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button class="logout-btn" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
          Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button
            class="mobile-menu-btn"
            (click)="sidebarOpen = !sidebarOpen"
          >
            ☰
          </button>

          <div>
            <h1>Dashboard</h1>
            <p>Bienvenido guardia</p>
          </div>
        </div>

        <div class="user-badge">
          Guardia
        </div>
      </header>

      <!-- CONTENT -->
      <section class="content-wrapper">

        <ng-container [ngSwitch]="seccionActiva">

          <!-- REGISTRAR VISITAS -->
          <div
            *ngSwitchCase="'registrarVisitas'"
            class="content-card"
          >
            <app-registro-visitas></app-registro-visitas>

            <div class="mt-6">
              <app-lector-qr></app-lector-qr>
            </div>
          </div>

          <!-- LISTAR VISITAS -->
          <div
            *ngSwitchCase="'listarVisitas'"
            class="content-card"
          >
            <app-delivery-alertas></app-delivery-alertas>

            <div class="mt-6">
              <app-lista-visitas></app-lista-visitas>
            </div>
          </div>

          <!-- REGISTRAR TURNOS -->
          <div
            *ngSwitchCase="'registrarTurnos'"
            class="content-card"
          >
            <app-turnos-guardias></app-turnos-guardias>
          </div>

          <!-- LISTAR TURNOS -->
          <div
            *ngSwitchCase="'listarTurnos'"
            class="content-card"
          >
            <app-lista-turnos></app-lista-turnos>
          </div>

          <!-- REGISTRAR RONDAS -->
          <div
            *ngSwitchCase="'registrarRondas'"
            class="content-card"
          >
            <app-rondas-guardia></app-rondas-guardia>
          </div>

          <!-- LISTAR RONDAS -->
          <div
            *ngSwitchCase="'listarRondas'"
            class="content-card"
          >
            <app-lista-rondas></app-lista-rondas>
          </div>

          <!-- DEFAULT -->
          <div *ngSwitchDefault class="welcome-card">
            <h2>Bienvenido a SENTRI</h2>

            <p>
              Plataforma moderna para administración y control de accesos.
            </p>
          </div>

        </ng-container>

      </section>

    </main>
  </div>

  <!-- FOOTER -->
  <ion-footer class="sticky-footer">
    <ion-toolbar color="dark">
      <div
        class="footer"
        style="text-align: center; font-size: 12px;"
      >
        © 2025 Jonathan Bustos Ramos TODOS LOS DERECHOS RESERVADOS
        <br />
        Sistema de Gestión de Condominios - Versión 1.0
      </div>
    </ion-toolbar>
  </ion-footer>

</ion-content>
